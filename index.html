<style>
    html,
    body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0F1510;
    }

    #loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align:center;
        background: radial-gradient(circle at top, rgba(119,171,96,.18), transparent 60%), #0F1510;
        color: white;
        z-index: 9999;
    }

    .loading-logo {
        width: 180px;
        margin-bottom: 2rem;
        animation: float 3s ease-in-out infinite;
    }

    #loading-screen h1 {
        margin: .5rem 0;
        font-size: 2.8rem;
        font-weight: 800;
    }

    #loading-screen p {
        color: #C7D0C2;
        margin-bottom: 2rem;
    }

    .loading-bar {
        width: 420px;
        max-width: 80vw;
        height: 14px;
        background: #243224;
        border-radius: 999px;
        overflow: hidden;
    }

    #loading-progress {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg,#77AB60,#A7D38C);
        transition: width .2s linear;
    }

    #loading-percent {
        margin-top: 1rem;
        color: #A7D38C;
        font-weight: bold;
    }

    @keyframes float {

        0% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-10px);
        }

        100% {
            transform: translateY(0px);
        }
    }

</style>
